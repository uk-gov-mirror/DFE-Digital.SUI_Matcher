name: Azure Infra Deployment

on:
  push:
    branches:
    - main
    paths:
    - 'infra/**'
    - 'src/app-host/infra/**'
    - 'src/SUI.Client/SUI.Client.Watcher/infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: The environment target for deployment
        default: 'Integration'
        type: choice
        options:
          - 'Integration'
      what_if:
        description: Run bicep what-if to check for changes
        default: true
        type: boolean
      version:
        description: The version of the infrastructure to provision (defaults to branch)
        type: string
        required: false
      use_current_branch:
        description: Override version selection and use the current branch code
        default: false
        type: boolean
      environment_prefix:
        description: The prefix for the environment
        default: 's215d01'
        type: string
      enable_audit_logging:
        description: Enabling will provision the audit logging infrastructure
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env: 
      AZURE_ENV_NAME: ${{ inputs.environment || 'Integration' }}
      AZURE_ENV_PREFIX: ${{ inputs.environment_prefix || 's215d01' }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      INFRA_VERSION: ${{ inputs.version }}
      AZURE_MONITORING_ACTION_GROUP_EMAIL: ${{ secrets.AZURE_MONITORING_ACTION_GROUP_EMAIL }}
      AZURE_CONTAINER_APP_MANAGED_ENVIRONMENT_NUMBER: ${{ vars.AZURE_CONTAINER_APP_MANAGED_ENVIRONMENT_NUMBER }}
      AZURE_CONTAINER_APP_VNET: ${{ secrets.AZURE_CONTAINER_APP_VNET }}
      AZURE_CONTAINER_APP_ENV_SUBNET: ${{ secrets.AZURE_CONTAINER_APP_ENV_SUBNET }}
      FeatureToggles__EnableAuditLogging: ${{ inputs.enable_audit_logging || 'false' }}
      AZURE_ENABLE_AUDIT_LOGGING: ${{ inputs.enable_audit_logging || 'false' }}
      VM_USERNAME: ${{ secrets.VM_USERNAME }}
      VM_PASSWORD: ${{ secrets.VM_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Get latest tag if no version provided'
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.use_current_branch }}
        id: get_latest_tag
        run: |
          if [[ -z "${{ env.INFRA_VERSION }}" ]]; then
            git fetch --tags
            LATEST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
            echo "Latest tag is: $LATEST_TAG"
            echo "infra_version=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "Using provided version: ${{ env.INFRA_VERSION }}"
            echo "infra_version=${{ env.INFRA_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Checkout (version)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.use_current_branch }}
        uses: actions/checkout@v6
        with:
          ref: ${{ env.infra_version }}

      - name: Ensure Azure CLI is installed
        run: |
          if ! command -v az &> /dev/null; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        
      - name: Run Bicep What-If
        if: ${{ github.event_name == 'push' || inputs.what_if == true }}
        uses: Azure/deployment-what-if-action@v1.0.0
        with:
          subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          templateFile: infra/stacks/client-agent/main.bicep
          additionalParameters: environmentName="${{ env.AZURE_ENV_NAME }}" environmentPrefix="${{ env.AZURE_ENV_PREFIX }}" location="${{ env.AZURE_LOCATION }}" monitoringActionGroupEmail="${{ env.AZURE_MONITORING_ACTION_GROUP_EMAIL }}" containerAppManagedEnvironmentNumber="${{ env.AZURE_CONTAINER_APP_MANAGED_ENVIRONMENT_NUMBER }}" containerAppVnet="${{ env.AZURE_CONTAINER_APP_VNET }}" containerAppEnvSubnet="${{ env.AZURE_CONTAINER_APP_ENV_SUBNET }}" enableAuditLogging="${{ env.FeatureToggles__EnableAuditLogging }}" adminUsername="${{ env.VM_USERNAME }}" adminPassword="${{ env.VM_PASSWORD }}"

      - name: Provision Infrastructure
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.what_if == false }}
        run: |
          az deployment group create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --template-file infra/stacks/client-agent/main.bicep \
            --parameters environmentName="${{ env.AZURE_ENV_NAME }}" \
              environmentPrefix="${{ env.AZURE_ENV_PREFIX }}" \
              location="${{ env.AZURE_LOCATION }}" \
              monitoringActionGroupEmail="${{ env.AZURE_MONITORING_ACTION_GROUP_EMAIL }}" \
              containerAppManagedEnvironmentNumber="${{ env.AZURE_CONTAINER_APP_MANAGED_ENVIRONMENT_NUMBER }}" \
              containerAppVnet="${{ env.AZURE_CONTAINER_APP_VNET }}" \
              containerAppEnvSubnet="${{ env.AZURE_CONTAINER_APP_ENV_SUBNET }}" \
              enableAuditLogging="${{ env.FeatureToggles__EnableAuditLogging }}" \
              adminUsername="${{ env.VM_USERNAME }}" \
              adminPassword="${{ env.VM_PASSWORD }}"
